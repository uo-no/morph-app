<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Verb Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fff;
  color: #1a1a18;
  font-size: 14px;
  line-height: 1.6;
}
.app { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.card {
  background: #fff;
  border: 0.5px solid #e5e4de;
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }

textarea {
  width: 100%;
  min-height: 80px;
  resize: vertical;
  font-size: 15px;
  font-family: inherit;
  padding: 10px 12px;
  border: 0.5px solid #ccc;
  border-radius: 8px;
  background: #fff;
  color: #1a1a18;
  line-height: 1.8;
}
textarea:focus { outline: none; border-color: #888; }

.btn-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }

.btn {
  padding: 7px 16px;
  font-size: 13px;
  border: 0.5px solid #ccc;
  border-radius: 8px;
  background: transparent;
  color: #1a1a18;
  cursor: pointer;
}
.btn:hover { background: #f4f3ee; }
.btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn.primary:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

#status { font-size: 12px; color: #888; margin-left: auto; }

.output-box {
  background: #f9f9f8;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  font-size: 18px;
  line-height: 2.4;
  color: #1a1a18;
  min-height: 60px;
  border: 0.5px solid #e5e4de;
  word-break: break-word;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 1rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #888;
}
.legend-sample {
  font-size: 14px;
  color: #1a1a18;
  padding: 0 2px;
}

/* 時制の装飾 */
.present    { text-decoration: underline; }
.imperfect  { text-decoration: none; }
.future     { text-decoration: underline double; }
.aorist     { text-decoration: underline dotted; }
.perfect    { text-decoration: underline wavy; }
.pluperfect { text-decoration: none; }

/* 態の装飾 */
.middle::after,
.passive::after {
  content: "*";
  margin-left: 2px;
  font-size: 0.7em;
  vertical-align: super;
  opacity: 0.9;
}

/* 法による背景色 */
.indicative  { background-color: #fffacd; padding: 0 3px; }
.imperative  { background-color: #fffacd; padding: 0 3px; }
.subjunctive { background-color: transparent; }
.optative    { background-color: transparent; }
.infinitive  { background-color: transparent; }
.participle  { background-color: transparent; }

/* ツールチップ */
.verb-hit { position: relative; cursor: help; }
.verb-hit::before {
  content: attr(data-info);
  display: none;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a18;
  color: #fff;
  font-size: 11px;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 6px;
  z-index: 10;
  pointer-events: none;
}
.verb-hit:hover::before { display: block; }

.section-title {
  font-size: 11px;
  font-weight: 500;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <label>テキスト入力</label>
    <textarea id="input" rows="3" placeholder="例：ἐκλήθητε ἐβεβαιώθη（コイネー・ギリシャ語のテキストを貼り付け）"></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="analyze()">解析</button>
      <button class="btn" onclick="clearAll()">クリア</button>
      <span id="status">データ読み込み中...</span>
    </div>
  </div>

  <div class="card" id="outputCard" style="display:none;">
    <p class="section-title">解析結果</p>
    <div class="output-box" id="output"></div>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline">［動詞］</span>
        <span>現在形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline dotted">［動詞］</span>
        <span>アオリスト形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline wavy">［動詞］</span>
        <span>完了形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline double">［動詞］</span>
        <span>未来形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample">［動詞］*</span>
        <span>中動・受動態</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="background-color:#fffacd;padding:0 3px">［動詞］</span>
        <span>直説法・命令法</span>
      </div>
    </div>
  </div>
</div>

<script>
let morphMap = new Map();

// ── morphgnt.json の生の値 → 正規化ラベルへの変換テーブル ──────────────

// tense: 1文字コード（"P","I","F","A","X","Y"）と英語ラベルの両方に対応
const TENSE_NORM = {
  "P": "present",    "present":    "present",
  "I": "imperfect",  "imperfect":  "imperfect",
  "F": "future",     "future":     "future",
  "A": "aorist",     "aorist":     "aorist",
  "X": "perfect",    "perfect":    "perfect",
  "Y": "pluperfect", "pluperfect": "pluperfect"
};

// voice: 1文字コード・英語ラベル・複合語（"middle deponent" 等）に対応
const VOICE_NORM = {
  "A": "active",   "active":           "active",
  "M": "middle",   "middle":           "middle",
                   "middle deponent":  "middle",
  "P": "passive",  "passive":          "passive",
                   "passive deponent": "passive",
  "D": "middle",   "deponent":         "middle",
                   "middle or passive":"passive",
                   "middle/passive":   "passive"
};

// mood: 1文字コード（"I","D","S","O","N","P"）と英語ラベルの両方に対応
const MOOD_NORM = {
  "I": "indicative",  "indicative":  "indicative",
  "D": "imperative",  "imperative":  "imperative",
  "S": "subjunctive", "subjunctive": "subjunctive",
  "O": "optative",    "optative":    "optative",
  "N": "infinitive",  "infinitive":  "infinitive",
  "P": "participle",  "participle":  "participle"
};

// number: 1文字コード（"S","P","D"）と英語ラベルの両方に対応
const NUMBER_NORM = {
  "S": "singular", "singular": "singular",
  "P": "plural",   "plural":   "plural",
  "D": "dual",     "dual":     "dual"
};

// person: "1st"/"2nd"/"3rd" と "1"/"2"/"3" の両方に対応
const PERSON_NORM = {
  "1": "1", "1st": "1",
  "2": "2", "2nd": "2",
  "3": "3", "3rd": "3"
};

function normalizeMorph(raw) {
  return {
    tense:  TENSE_NORM[raw.tense]   || null,
    voice:  VOICE_NORM[raw.voice]   || null,
    mood:   MOOD_NORM[raw.mood]     || null,
    number: NUMBER_NORM[raw.number] || null,
    person: PERSON_NORM[raw.person] || null
  };
}

// ── ギリシャ語正規化（アクセント・特殊記号・句読点を除去）────────────────
function normalizeGreek(text) {
  return text
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")          // アクセント記号・気息記号
    .replace(/[⸂⸃\u2018\u2019]/g, "")        // 特殊引用符
    .replace(/[.,;:!?\u0387\u00b7·]/g, "")    // 句読点（語末ピリオドなど）
    .replace(/ς/g, "σ");                       // 語末シグマを通常シグマに統一
}

// ── データ読み込み ────────────────────────────────────────────────────────
fetch("morphgnt.json")
  .then(res => res.json())
  .then(data => {
    console.log("loaded words:", data.length);
    console.log("sample:", data[0]);

    data.forEach(w => {
      // 動詞のみ処理
      if (w.pos !== "V-") return;

      // word フィールドを正規化（句読点・アクセントを除去してキーにする）
      const key = normalizeGreek(w.word || "");
      if (!key) return;

      // morph を統一フォーマットに変換
      const morph = normalizeMorph(w.morph || {});
      const entry = { morph, lemma: w.lemma, word: w.word };

      if (!morphMap.has(key)) morphMap.set(key, []);
      const arr = morphMap.get(key);

      // 同一形態素の重複を排除
      const isDup = arr.some(e =>
        e.morph.tense  === morph.tense  &&
        e.morph.voice  === morph.voice  &&
        e.morph.mood   === morph.mood   &&
        e.morph.person === morph.person &&
        e.morph.number === morph.number
      );
      if (!isDup) arr.push(entry);
    });

    const total = [...morphMap.values()].reduce((s, a) => s + a.length, 0);
    document.getElementById("status").textContent =
      "準備完了（動詞: " + total.toLocaleString() + "件）";
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").textContent = "morphgnt.json が見つかりません";
  });

// ── 表示用ラベル ──────────────────────────────────────────────────────────
const TENSE_LABEL  = {
  present:"現在", imperfect:"未完了", future:"未来",
  aorist:"アオリスト", perfect:"完了", pluperfect:"過去完了"
};
const VOICE_LABEL  = { active:"能動", middle:"中動", passive:"受動" };
const MOOD_LABEL   = {
  indicative:"直説法", subjunctive:"接続法", optative:"希求法",
  imperative:"命令法", infinitive:"不定詞",  participle:"分詞"
};
const PERSON_LABEL = { "1":"1人称", "2":"2人称", "3":"3人称" };
const NUMBER_LABEL = { singular:"単数", plural:"複数", dual:"双数" };

function getMorphLabel(morph) {
  return [
    TENSE_LABEL[morph.tense],
    VOICE_LABEL[morph.voice],
    MOOD_LABEL[morph.mood],
    PERSON_LABEL[morph.person],
    NUMBER_LABEL[morph.number]
  ].filter(Boolean).join("/");
}

// ── 装飾 HTML 生成 ────────────────────────────────────────────────────────
function decorate(word, entries) {
  if (!entries || entries.length === 0) return `<span>${word}</span>`;

  // ラベル重複排除
  const seen = new Set();
  const unique = [];
  entries.forEach(e => {
    const label = getMorphLabel(e.morph);
    if (!seen.has(label)) { seen.add(label); unique.push(e); }
  });

  const info = unique.map(e => getMorphLabel(e.morph)).join(" | ");

  // 優先順位で主エントリを選択（直説法 > 命令法 > 分詞 > 不定詞 > 先頭）
  const priority = ["indicative", "imperative", "participle", "infinitive"];
  let main = unique[0];
  for (const p of priority) {
    const found = unique.find(e => e.morph.mood === p);
    if (found) { main = found; break; }
  }

  const m = main.morph;
  const tenseClass = m.tense || "";
  const voiceClass = (m.voice === "middle" || m.voice === "passive") ? m.voice : "";
  const moodClass  = m.mood  || "";

  const classes = ["verb-hit", tenseClass, voiceClass, moodClass]
    .filter(Boolean).join(" ");

  return `<span class="${classes}" data-info="${info}">${word}</span>`;
}

// ── 解析 ──────────────────────────────────────────────────────────────────
function analyze() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  // 空白・改行で分割（語内の句読点はそのまま残して表示し、キー生成時に除去する）
  const tokens = input.split(/[\s\u00a0]+/).filter(w => w);
  let output = "";

  tokens.forEach(token => {
    const key = normalizeGreek(token);
    console.log("INPUT:", token, "  KEY:", key, "  HIT:", morphMap.has(key));
    const candidates = morphMap.get(key) || [];
    output += decorate(token, candidates) + " ";
  });

  document.getElementById("output").innerHTML = output.trim();
  document.getElementById("outputCard").style.display = "block";
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("outputCard").style.display = "none";
}
</script>
</body>
</html>
