<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Verb Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fff;
  color: #1a1a18;
  font-size: 14px;
  line-height: 1.6;
}
.app { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

h1 { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a18; }

.card {
  background: #fff;
  border: 0.5px solid #e5e4de;
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }

textarea {
  width: 100%;
  min-height: 80px;
  resize: vertical;
  font-size: 15px;
  font-family: inherit;
  padding: 10px 12px;
  border: 0.5px solid #ccc;
  border-radius: 8px;
  background: #fff;
  color: #1a1a18;
  line-height: 1.8;
}
textarea:focus { outline: none; border-color: #888; }

.btn-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }

.btn {
  padding: 7px 16px;
  font-size: 13px;
  border: 0.5px solid #ccc;
  border-radius: 8px;
  background: transparent;
  color: #1a1a18;
  cursor: pointer;
}
.btn:hover { background: #f4f3ee; }
.btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn.primary:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

#status { font-size: 12px; color: #888; margin-left: auto; }

/* 出力エリア */
.output-box {
  background: #f9f9f8;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  font-size: 18px;
  line-height: 2.4;
  color: #1a1a18;
  min-height: 60px;
  border: 0.5px solid #e5e4de;
  word-break: break-word;
}

/* 凡例 */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 1rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #888;
}
.legend-sample {
  font-size: 14px;
  color: #1a1a18;
  padding: 0 2px;
}

/* 時制の装飾 */
.present { text-decoration: underline; }
.imperfect { text-decoration: none; }
.future { text-decoration: underline double; }
.aorist { text-decoration: underline dotted; }
.perfect { text-decoration: underline wavy; }
.pluperfect { text-decoration: none; }

/* 態の装飾 */
.middle::after,
.passive::after {
  content: "*";
  margin-left: 2px;
  font-size: 0.7em;
  vertical-align: super;
  opacity: 0.9;
}

/* 法による背景色 */
.indicative { background-color: #fffacd; padding: 0 3px; }
.imperative { background-color: #fffacd; padding: 0 3px; }
.subjunctive { background-color: transparent; }
.optative { background-color: transparent; }
.infinitive { background-color: transparent; }
.participle { background-color: transparent; }

/* ヒットした語にバッジ */
.verb-hit {
  position: relative;
  cursor: help;
}
.verb-hit::before {
  content: attr(data-info);
  display: none;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a18;
  color: #fff;
  font-size: 11px;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 6px;
  z-index: 10;
  pointer-events: none;
}
.verb-hit:hover::before { display: block; }

.section-title {
  font-size: 11px;
  font-weight: 500;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <label>テキスト入力</label>
    <textarea id="input" rows="3" placeholder="例：ἐκλήθητε ἐβεβαιώθη（コイネー・ギリシャ語のテキストを貼り付け）"></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="analyze()">解析</button>
      <button class="btn" onclick="clearAll()">クリア</button>
      <span id="status">データ読み込み中...</span>
    </div>
  </div>

  <div class="card" id="outputCard" style="display:none;">
    <p class="section-title">解析結果</p>
    <div class="output-box" id="output"></div>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline">［動詞］</span>
        <span>現在形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline dotted">［動詞］</span>
        <span>アオリスト形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline wavy">［動詞］</span>
        <span>完了形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="text-decoration:underline double">［動詞］</span>
        <span>未来形</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample">［動詞］*</span>
        <span>中動・受動態</span>
      </div>
      <div class="legend-item">
        <span class="legend-sample" style="background-color:#fffacd;padding:0 3px">［動詞］</span>
        <span>直説法・命令法</span>
      </div>      
    </div>
  </div>
</div>
  
<script>
let morphMap = new Map();

fetch("morphgnt.json")
  .then(res => res.json())
  .then(data => {

    console.log("loaded words:", data.length);
    console.log("sample:", data[0]);
    console.log("sample morph:", data[0]?.morph);

    data.forEach(w => {
      // 動詞判定（pos === "V-"）
      if (w.pos === "V-") {
        const key = normalizeGreek(w.word || "");
        if (!key) return;
        if (!morphMap.has(key)) {
          morphMap.set(key, []);
        }
        const arr = morphMap.get(key);
        const isDup = arr.some(e => 
          e.morph.tense === w.morph.tense &&
          e.morph.voice === w.morph.voice &&
          e.morph.mood === w.morph.mood &&
          e.morph.person === w.morph.person &&
          e.morph.number === w.morph.number
        );
        if (!isDup) {
          arr.push(w);
        }
      }
    });
    const total = [...morphMap.values()].reduce((s, a) => s + a.length, 0);
    document.getElementById("status").textContent =
      "準備完了（動詞: " + total.toLocaleString() + "件）";
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").textContent = "morphgnt.json が見つかりません";
  });

  function normalizeGreek(text) {
  return text.toLowerCase()
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[⸂⸃]/g, "")
    .replace(/ς/g, "σ");
}
}
  
const TENSE_LABEL = {
  "present": "現在",
  "imperfect": "未完了",
  "future": "未来",
  "aorist": "アオリスト",
  "perfect": "完了",
  "pluperfect": "過去完了"
};

const VOICE_LABEL = {
  "active": "能動",
  "middle": "中動",
  "passive": "受動"
};

const MOOD_LABEL = {
  "indicative": "直説法",
  "subjunctive": "接続法",
  "optative": "希求法",
  "imperative": "命令法",
  "infinitive": "不定詞",
  "participle": "分詞"
};

const PERSON_LABEL = {
  "1": "1人称",
  "2": "2人称",
  "3": "3人称"
};

const NUMBER_LABEL = {
  "singular": "単数",
  "S": "単数",
  "plural": "複数",
  "P": "複数"
};

function getMorphLabel(morph) {
  const parts = [];
  
  if (morph.tense) {
    const t = TENSE_LABEL[morph.tense];
    if (t) parts.push(t);
  }
  
  if (morph.voice) {
    const v = VOICE_LABEL[morph.voice];
    if (v) parts.push(v);
  }
  
  if (morph.mood) {
    const m = MOOD_LABEL[morph.mood];
    if (m) parts.push(m);
  }
  
  if (morph.person) {
    const p = PERSON_LABEL[morph.person];
    if (p) parts.push(p);
  }
  
  if (morph.number) {
    const n = NUMBER_LABEL[morph.number];
    if (n) parts.push(n);
  }
  
  return parts.join("/");
}

function decorate(word, entries) {
  if (!entries || entries.length === 0) {
    return `<span>${word}</span>`;
  }

  // 重複排除
  const seen = new Set();
  const unique = [];

  entries.forEach(e => {
    const label = getMorphLabel(e.morph);
    if (!seen.has(label)) {
      seen.add(label);
      unique.push({ label, entry: e });
    }
  });

  // ツールチップ用テキスト
  const info = unique.map(u => u.label).join(" | ");

  // 優先順位で主要な形態素を選択
  const priority = ["indicative", "imperative", "participle", "infinitive"];
  let main = unique[0];

  for (const p of priority) {
    const found = unique.find(u => u.entry.morph.mood === p);
    if (found) {
      main = found;
      break;
    }
  }

  const m = main.entry.morph;

  // クラス決定（時制）
  let tenseClass = "";
  if (m.tense === "present") tenseClass = "present";
  else if (m.tense === "imperfect") tenseClass = "imperfect";
  else if (m.tense === "future") tenseClass = "future";
  else if (m.tense === "aorist") tenseClass = "aorist";
  else if (m.tense === "perfect") tenseClass = "perfect";
  else if (m.tense === "pluperfect") tenseClass = "pluperfect";

  // クラス決定（態）
  let voiceClass = "";
  if (m.voice === "middle") voiceClass = "middle";
  else if (m.voice === "passive") voiceClass = "passive";

  // クラス決定（法）
  let moodClass = "";
  if (m.mood === "indicative") moodClass = "indicative";
  else if (m.mood === "subjunctive") moodClass = "subjunctive";
  else if (m.mood === "optative") moodClass = "optative";
  else if (m.mood === "imperative") moodClass = "imperative";
  else if (m.mood === "infinitive") moodClass = "infinitive";
  else if (m.mood === "participle") moodClass = "participle";

  const classes = ["verb-hit", tenseClass, voiceClass, moodClass]
    .filter(Boolean)
    .join(" ");

  return `<span class="${classes}" data-info="${info}">${word}</span>`;
}

function analyze() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;
  
  const words = input.split(/[\s.,;:()]+/).filter(w => w);
  let output = "";
  
  words.forEach(word => {
    const key = normalizeGreek(word);
    
    console.log("INPUT:", word);
    console.log("KEY:", key);
    console.log("MAP HIT:", morphMap.get(key));
    
    const candidates = morphMap.get(key) || [];
    
    if (candidates.length > 0) {
      output += decorate(word, candidates) + " ";
    } else {
      output += `<span>${word}</span> `;
    }
  });
  
  document.getElementById("output").innerHTML = output.trim();
  document.getElementById("outputCard").style.display = "block";
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("outputCard").style.display = "none";
}
</script>
</body>
</html>
